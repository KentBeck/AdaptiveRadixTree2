name: test

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.23.x, 1.24.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt found unformatted files:"
            gofmt -l .
            exit 1
          fi

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Test with race detector
        run: go test -race ./... -count=1

      - name: Fuzz smoke (30s)
        run: go test -run=^$ -fuzz=FuzzSortedMap -fuzztime=30s ./...

